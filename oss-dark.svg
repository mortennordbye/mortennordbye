<svg xmlns="http://www.w3.org/2000/svg" width="840" height="210" viewBox="0 0 840 210" role="img">
  <defs>
    <style>
  .reveal{animation:rise .7s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .bar{transform-box:fill-box;transform-origin:bottom;animation:grow .9s cubic-bezier(.2,.7,.3,1) both}
  @keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .skbar{transform-box:fill-box;transform-origin:left;animation:growx 1.1s cubic-bezier(.2,.7,.3,1) both}
  @keyframes growx{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .shimmer{animation:sweep 3.4s ease-in-out infinite}
  @keyframes sweep{0%{transform:translateX(-45%)}50%{transform:translateX(45%)}100%{transform:translateX(-45%)}}
  .pulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .draw{stroke-dasharray:4000;stroke-dashoffset:4000;animation:draw 2.4s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .fadein{opacity:0;animation:fadein 1.2s ease-out .5s forwards}
  @keyframes fadein{to{opacity:1}}</style>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5db7ff"/><stop offset="0.5" stop-color="#8b7dff"/><stop offset="1" stop-color="#58d2c9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.75"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a0e"/><stop offset="0.6" stop-color="#111923"/><stop offset="1" stop-color="#0a1015"/>
      <animate attributeName="x2" values="1;0.7;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="topclip"><rect x="0" y="0" width="840" height="3"/></clipPath>
  </defs>
  <rect x="0.5" y="0.5" width="839" height="209" rx="14" fill="#0a1015" stroke="#2a3849"/>
  <g clip-path="url(#topclip)">
         <rect x="0" y="0" width="840" height="3" fill="url(#accent)"/>
         <rect class="shimmer" x="290" y="0" width="260" height="3" fill="url(#glow)"/>
       </g>
  <g class="reveal"><text x="40" y="40" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#8898aa" text-anchor="start" opacity="1">OPEN SOURCE · MERGED CONTRIBUTIONS</text>
        <text x="40" y="86" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="600" fill="#5db7ff" text-anchor="start" opacity="1">traefik/traefik</text>
        <text x="40" y="104" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#b0bccb" text-anchor="start" opacity="1">Gateway API: multi-cert listeners (v3.7.0)</text>
        <g transform="translate(726,73)"><path d="M8 .6l2.2 4.6 5.1.5-3.8 3.4 1.1 5L8 12.9 3.4 15l1.1-5L.7 5.7l5.1-.5z" fill="#58d2c9"/></g>
        <text x="800" y="85" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#e8eef5" text-anchor="end" opacity="1">64.1k</text>
        <line x1="40" y1="112" x2="800" y2="112" stroke="#2a3849"/>
        <text x="40" y="130" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="600" fill="#5db7ff" text-anchor="start" opacity="1">nunocoracao/blowfish</text>
        <text x="40" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#b0bccb" text-anchor="start" opacity="1">Hugo theme that powers my blog</text>
        <g transform="translate(726,117)"><path d="M8 .6l2.2 4.6 5.1.5-3.8 3.4 1.1 5L8 12.9 3.4 15l1.1-5L.7 5.7l5.1-.5z" fill="#58d2c9"/></g>
        <text x="800" y="129" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#e8eef5" text-anchor="end" opacity="1">2.8k</text>
        <line x1="40" y1="156" x2="800" y2="156" stroke="#2a3849"/>
        <text x="40" y="174" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="600" fill="#5db7ff" text-anchor="start" opacity="1">FidelusAleksander/ghcertified</text>
        <text x="40" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#b0bccb" text-anchor="start" opacity="1">GitHub certification practice tool</text>
        <g transform="translate(726,161)"><path d="M8 .6l2.2 4.6 5.1.5-3.8 3.4 1.1 5L8 12.9 3.4 15l1.1-5L.7 5.7l5.1-.5z" fill="#58d2c9"/></g>
        <text x="800" y="173" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="#e8eef5" text-anchor="end" opacity="1">939</text>
        </g>
</svg>