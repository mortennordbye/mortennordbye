<svg xmlns="http://www.w3.org/2000/svg" width="840" height="150" viewBox="0 0 840 150" role="img">
  <defs>
    <style>
  .reveal{animation:rise .7s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .bar{transform-box:fill-box;transform-origin:bottom;animation:grow .9s cubic-bezier(.2,.7,.3,1) both}
  @keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .skbar{transform-box:fill-box;transform-origin:left;animation:growx 1.1s cubic-bezier(.2,.7,.3,1) both}
  @keyframes growx{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .shimmer{animation:sweep 3.4s ease-in-out infinite}
  @keyframes sweep{0%{transform:translateX(-45%)}50%{transform:translateX(45%)}100%{transform:translateX(-45%)}}
  .pulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .draw{stroke-dasharray:4000;stroke-dashoffset:4000;animation:draw 2.4s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .fadein{opacity:0;animation:fadein 1.2s ease-out .5s forwards}
  @keyframes fadein{to{opacity:1}}</style>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6fda"/><stop offset="0.5" stop-color="#6552d8"/><stop offset="1" stop-color="#2a9d94"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.75"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2f7"/><stop offset="0.6" stop-color="#ecf1f7"/><stop offset="1" stop-color="#f6f8fb"/>
      <animate attributeName="x2" values="1;0.7;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="topclip"><rect x="0" y="0" width="840" height="3"/></clipPath>
  </defs>
  <rect x="0.5" y="0.5" width="839" height="149" rx="14" fill="#f6f8fb" stroke="#d6dde7"/>
  <g clip-path="url(#topclip)">
         <rect x="0" y="0" width="840" height="3" fill="url(#accent)"/>
         <rect class="shimmer" x="290" y="0" width="260" height="3" fill="url(#glow)"/>
       </g>
  <g class="reveal"><text x="40" y="40" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#5e6b7c" text-anchor="start" opacity="1">CERTIFICATIONS</text><rect x="40" y="58" width="232" height="24" rx="12" fill="#ecf1f7" stroke="#d6dde7"/>
      <text x="156" y="75" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="500" fill="#0d141d" text-anchor="middle" opacity="1">GitHub Actions Certification</text><rect x="280" y="58" width="262" height="24" rx="12" fill="#ecf1f7" stroke="#d6dde7"/>
      <text x="411" y="75" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="500" fill="#0d141d" text-anchor="middle" opacity="1">Azure Solutions Architect Expert</text><rect x="550" y="58" width="240" height="24" rx="12" fill="#ecf1f7" stroke="#d6dde7"/>
      <text x="670" y="75" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="500" fill="#0d141d" text-anchor="middle" opacity="1">Azure Administrator Associate</text><rect x="40" y="88" width="240" height="24" rx="12" fill="#ecf1f7" stroke="#d6dde7"/>
      <text x="160" y="105" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="500" fill="#0d141d" text-anchor="middle" opacity="1">CKA: Kubernetes Administrator</text><rect x="288" y="88" width="270" height="24" rx="12" fill="#ecf1f7" stroke="#d6dde7"/>
      <text x="423" y="105" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="500" fill="#0d141d" text-anchor="middle" opacity="1">LFS458: Kubernetes Administration</text><rect x="566" y="88" width="188" height="24" rx="12" fill="#ecf1f7" stroke="#d6dde7"/>
      <text x="660" y="105" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="500" fill="#0d141d" text-anchor="middle" opacity="1">AWS Cloud Practitioner</text></g>
</svg>