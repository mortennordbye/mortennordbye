<svg xmlns="http://www.w3.org/2000/svg" width="840" height="176" viewBox="0 0 840 176" role="img">
  <defs>
    <style>
  .reveal{animation:rise .7s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .bar{transform-box:fill-box;transform-origin:bottom;animation:grow .9s cubic-bezier(.2,.7,.3,1) both}
  @keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .skbar{transform-box:fill-box;transform-origin:left;animation:growx 1.1s cubic-bezier(.2,.7,.3,1) both}
  @keyframes growx{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .shimmer{animation:sweep 3.4s ease-in-out infinite}
  @keyframes sweep{0%{transform:translateX(-45%)}50%{transform:translateX(45%)}100%{transform:translateX(-45%)}}
  .pulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .draw{stroke-dasharray:4000;stroke-dashoffset:4000;animation:draw 2.4s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .fadein{opacity:0;animation:fadein 1.2s ease-out .5s forwards}
  @keyframes fadein{to{opacity:1}}</style>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5db7ff"/><stop offset="0.5" stop-color="#8b7dff"/><stop offset="1" stop-color="#58d2c9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.75"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a0e"/><stop offset="0.6" stop-color="#111923"/><stop offset="1" stop-color="#0a1015"/>
      <animate attributeName="x2" values="1;0.7;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="topclip"><rect x="0" y="0" width="840" height="3"/></clipPath>
  </defs>
  <rect x="0.5" y="0.5" width="839" height="175" rx="14" fill="#0a1015" stroke="#2a3849"/>
  <g clip-path="url(#topclip)">
         <rect x="0" y="0" width="840" height="3" fill="url(#accent)"/>
         <rect class="shimmer" x="290" y="0" width="260" height="3" fill="url(#glow)"/>
       </g>
  <g class="reveal">
      <text x="40" y="40" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#8898aa" text-anchor="start" opacity="1">LATEST FROM THE BLOG</text>
      <text x="800" y="40" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="12" font-weight="400" fill="#5db7ff" text-anchor="end" opacity="1">blog.nordbye.it</text>
      <circle cx="46" cy="69" r="3" fill="#5db7ff"/>
        <text x="62" y="74" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#e8eef5" text-anchor="start" opacity="1">Tuning Azure WAF Without Paying Log Analytics Prices</text>
        <text x="800" y="74" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="12" font-weight="400" fill="#8898aa" text-anchor="end" opacity="1">2026-07-16</text><circle cx="46" cy="103" r="3" fill="#5db7ff"/>
        <text x="62" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#e8eef5" text-anchor="start" opacity="1">Seeing Into a Talos Cluster: The Observability Stack I Actually Run</text>
        <text x="800" y="108" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="12" font-weight="400" fill="#8898aa" text-anchor="end" opacity="1">2026-06-15</text><circle cx="46" cy="137" r="3" fill="#5db7ff"/>
        <text x="62" y="142" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#e8eef5" text-anchor="start" opacity="1">Locking Down Your Cluster: Rolling Out Cilium Network Policies Without Breaking Everything</text>
        <text x="800" y="142" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace" font-size="12" font-weight="400" fill="#8898aa" text-anchor="end" opacity="1">2026-05-16</text>
    </g>
</svg>